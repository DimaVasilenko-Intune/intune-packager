<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intune Packager — Innstillinger</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <div class="page">
    <header class="page-header">
      <img src="../assets/icons/icon48.png" alt="" class="logo" onerror="this.style.display='none'">
      <div>
        <h1>Intune Packager</h1>
        <p class="subtitle">Innstillinger</p>
      </div>
    </header>

    <main class="page-main">

      <!-- ── Backend-seksjon ── -->
      <section class="section">
        <h2 class="section-title">Backend</h2>
        <div class="field">
          <label class="field-label" for="backend-url">Server-URL</label>
          <div class="input-row">
            <input type="url" id="backend-url" class="input" placeholder="http://localhost:3001" value="http://localhost:3001">
            <button class="btn btn-secondary" id="test-backend">Test</button>
          </div>
          <span class="field-hint">Lokal Express-server som håndterer crawling og analyse</span>
        </div>
        <div id="backend-status" class="status-msg hidden"></div>
      </section>

      <!-- ── AI-analyse ── -->
      <section class="section">
        <h2 class="section-title">AI-analyse</h2>
        <div class="field">
          <label class="field-label">AI-leverandør</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="ai-provider" value="none" checked>
              <span>Ingen AI — kun regex</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="ai-provider" value="openai">
              <span>OpenAI (GPT-4o mini)</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="ai-provider" value="claude">
              <span>Claude (Haiku)</span>
            </label>
          </div>
        </div>

        <div class="field" id="api-key-field" style="display:none">
          <label class="field-label" for="api-key">API-nøkkel</label>
          <div class="input-row">
            <input type="password" id="api-key" class="input" placeholder="sk-...  /  sk-ant-...">
            <button class="btn btn-ghost btn-sm" id="toggle-key" title="Vis/skjul">👁</button>
          </div>
          <span class="field-hint">Lagres lokalt i Chrome — sendes kun til din valgte AI-leverandør</span>
        </div>
      </section>

      <!-- ── Analysemodus ── -->
      <section class="section">
        <h2 class="section-title">Analysemodus</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="analyze-mode" value="ai-first" checked>
            <span>AI-first med regex-fallback <em>(anbefalt)</em></span>
          </label>
          <label class="radio-label">
            <input type="radio" name="analyze-mode" value="regex-only">
            <span>Kun regex (raskere, ingen API-kostnad)</span>
          </label>
        </div>
      </section>

      <!-- ── Lagre-knapp ── -->
      <div class="actions">
        <button class="btn btn-primary" id="save-btn">Lagre innstillinger</button>
        <span class="save-status hidden" id="save-status">✓ Lagret</span>
      </div>

      <!-- ── Om ── -->
      <section class="section section-about">
        <h2 class="section-title">Om</h2>
        <div class="about-grid">
          <div class="about-row">
            <span class="about-key">Versjon</span>
            <span class="about-val">1.0.0</span>
          </div>
          <div class="about-row">
            <span class="about-key">Backend</span>
            <span class="about-val" id="about-backend">—</span>
          </div>
          <div class="about-row">
            <span class="about-key">AI-modus</span>
            <span class="about-val" id="about-ai">Ingen</span>
          </div>
        </div>
        <p class="about-hint">
          Backend-kode: <code>cd ~/intune-packager/backend &amp;&amp; npm start</code>
        </p>
      </section>

    </main>
  </div>

  <script src="options.js"></script>
</body>
</html>
