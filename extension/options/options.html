<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intune Packager — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>

  <div class="page">
    <header class="page-header">
      <img src="../assets/icons/icon48.png" alt="" class="logo" onerror="this.style.display='none'">
      <div>
        <h1>Intune Packager</h1>
        <p class="subtitle">Settings</p>
      </div>
    </header>

    <main class="page-main">

      <!-- ── Backend section ── -->
      <section class="section">
        <h2 class="section-title">Backend</h2>
        <div class="field">
          <label class="field-label" for="backend-url">Server URL</label>
          <div class="input-row">
            <input type="url" id="backend-url" class="input" placeholder="http://localhost:3001" value="http://localhost:3001">
            <button class="btn btn-secondary" id="test-backend">Test</button>
          </div>
          <span class="field-hint">Local Express server that handles crawling and analysis</span>
        </div>
        <div id="backend-status" class="status-msg hidden"></div>
      </section>

      <!-- ── AI analysis ── -->
      <section class="section">
        <h2 class="section-title">AI Analysis</h2>
        <div class="field">
          <label class="field-label">AI Provider</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="ai-provider" value="none" checked>
              <span>No AI — regex only</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="ai-provider" value="openai">
              <span>OpenAI (GPT-4o mini)</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="ai-provider" value="claude">
              <span>Claude (Haiku)</span>
            </label>
          </div>
        </div>

        <div class="field" id="api-key-field" style="display:none">
          <label class="field-label" for="api-key">API Key</label>
          <div class="input-row">
            <input type="password" id="api-key" class="input" placeholder="sk-...  /  sk-ant-...">
            <button class="btn btn-ghost btn-sm" id="toggle-key" title="Show/hide">👁</button>
          </div>
          <span class="field-hint">Stored locally in Chrome — only sent to your selected AI provider</span>
        </div>
      </section>

      <!-- ── Analysis mode ── -->
      <section class="section">
        <h2 class="section-title">Analysis Mode</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="analyze-mode" value="ai-first" checked>
            <span>AI-first with regex fallback <em>(recommended)</em></span>
          </label>
          <label class="radio-label">
            <input type="radio" name="analyze-mode" value="regex-only">
            <span>Regex only (faster, no API cost)</span>
          </label>
        </div>
      </section>

      <!-- ── Save button ── -->
      <div class="actions">
        <button class="btn btn-primary" id="save-btn">Save settings</button>
        <span class="save-status hidden" id="save-status">✓ Saved</span>
      </div>

      <!-- ── About ── -->
      <section class="section section-about">
        <h2 class="section-title">About</h2>
        <div class="about-grid">
          <div class="about-row">
            <span class="about-key">Version</span>
            <span class="about-val">1.0.0</span>
          </div>
          <div class="about-row">
            <span class="about-key">Backend</span>
            <span class="about-val" id="about-backend">—</span>
          </div>
          <div class="about-row">
            <span class="about-key">AI mode</span>
            <span class="about-val" id="about-ai">None</span>
          </div>
        </div>
        <p class="about-hint">
          Backend: <code>cd intune-packager/backend &amp;&amp; npm start</code>
        </p>
      </section>

    </main>
  </div>

  <script src="options.js"></script>
</body>
</html>
