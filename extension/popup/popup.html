<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intune Packager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header — always visible -->
  <header class="header">
    <div class="header-brand">
      <img src="../assets/icons/icon48.png" alt="" class="brand-icon" onerror="this.style.display='none'">
      <span class="brand-name">Intune Packager</span>
    </div>
    <div class="header-right">
      <div class="status-badge" id="status-badge">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Checking...</span>
      </div>
      <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
    </div>
  </header>

  <!-- Main -->
  <main id="main">

    <!-- ─── State: idle ─── -->
    <div class="state" id="state-idle">
      <div class="center-content">
        <div class="idle-icon">📦</div>
        <p class="idle-text">Click Scan to analyze<br>installers on this page</p>
        <button class="btn btn-primary btn-wide" id="scan-btn-idle">
          <span class="btn-icon">🔍</span> Scan page
        </button>
      </div>
    </div>

    <!-- ─── State: scanning ─── -->
    <div class="state hidden" id="state-scanning">
      <div class="scanning-content">
        <div class="progress-steps" id="progress-steps">
          <div class="progress-step active" id="step-1">
            <div class="step-dot"></div>
            <div class="step-info">
              <span class="step-label">Scanning page</span>
              <span class="step-desc" id="step-1-desc">Looking for installers...</span>
            </div>
          </div>
          <div class="progress-step" id="step-2">
            <div class="step-dot"></div>
            <div class="step-info">
              <span class="step-label">Crawling vendor site</span>
              <span class="step-desc" id="step-2-desc">Waiting</span>
            </div>
          </div>
          <div class="progress-step" id="step-3">
            <div class="step-dot"></div>
            <div class="step-info">
              <span class="step-label">Analyzing installers</span>
              <span class="step-desc" id="step-3-desc">Waiting</span>
            </div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" id="cancel-btn">Cancel</button>
      </div>
    </div>

    <!-- ─── State: results ─── -->
    <div class="state hidden" id="state-results">
      <div class="results-toolbar">
        <span class="results-count" id="results-count"></span>
        <button class="btn btn-ghost btn-sm" id="rescan-btn">🔄 Rescan</button>
      </div>
      <div class="installer-list" id="installer-list">
        <!-- Installer cards injected by popup.js -->
      </div>
    </div>

    <!-- ─── State: detail ─── -->
    <div class="state hidden" id="state-detail">
      <div class="detail-nav">
        <button class="btn btn-ghost btn-sm" id="back-btn">← Back</button>
        <div id="detail-badges" class="badge-row"></div>
      </div>

      <div class="detail-title-block">
        <div class="detail-filename" id="detail-filename"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>

      <div class="confidence-block">
        <div class="confidence-row">
          <span class="label-sm">Confidence</span>
          <span class="confidence-pct" id="confidence-pct">—</span>
        </div>
        <div class="confidence-bar">
          <div class="confidence-fill" id="confidence-fill"></div>
        </div>
        <div class="ai-badge hidden" id="ai-badge">✨ AI-assisted</div>
      </div>

      <div class="cmd-section">
        <div class="cmd-label">Install command</div>
        <div class="code-block">
          <code id="install-cmd" class="cmd-code"></code>
          <button class="copy-btn" data-target="install-cmd" title="Copy">⧉</button>
        </div>
      </div>

      <div class="cmd-section">
        <div class="cmd-label">Uninstall command</div>
        <div class="code-block">
          <code id="uninstall-cmd" class="cmd-code"></code>
          <button class="copy-btn" data-target="uninstall-cmd" title="Copy">⧉</button>
        </div>
      </div>

      <div class="cmd-section">
        <div class="cmd-label">Detection rule (PowerShell)</div>
        <div class="code-block code-block-tall">
          <code id="detection-rule" class="cmd-code"></code>
          <button class="copy-btn" data-target="detection-rule" title="Copy">⧉</button>
        </div>
      </div>

      <button class="btn btn-primary btn-wide" id="download-btn">
        ⬇ Download package (ZIP)
      </button>
    </div>

    <!-- ─── State: error ─── -->
    <div class="state hidden" id="state-error">
      <div class="center-content">
        <div class="error-icon">⚠</div>
        <p class="error-message" id="error-message">An error occurred</p>
        <button class="btn btn-danger" id="retry-btn">🔄 Try again</button>
      </div>
    </div>

  </main>

  <script src="popup.js"></script>
</body>
</html>
